name: CI-CD

on:
  push:
    branches:
      - main
      - master

jobs:
  test-build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances backend
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests backend
        working-directory: ./backend
        run: npm test

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tp_final-backend:latest ./backend

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tp_final-frontend:latest ./frontend

      - name: Push backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tp_final-backend:latest

      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tp_final-frontend:latest

      - name: Déployer sur la VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/tp_final
            git pull
            sudo kubectl apply -f k8s/
            sudo kubectl rollout restart deployment backend-deployment
            sudo kubectl rollout restart deployment frontend-deployment
            sudo kubectl rollout restart deployment mysql-deployment
            sudo kubectl get pods